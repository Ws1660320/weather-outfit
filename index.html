<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,"Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:14px;min-height:100vh;padding:16px;padding-top:max(16px,env(safe-area-inset-top,16px))}
.wrap{max-width:420px;margin:0 auto}
.sr{display:flex;gap:8px;margin-bottom:12px}
.si{flex:1;background:rgba(255,255,255,0.15);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:10px 16px;color:#fff;outline:none;font-size:.85rem;font-family:inherit}
.si::placeholder{color:rgba(255,255,255,0.4)}

.sb:active{transform:scale(.95)}
.sres{background:rgba(255,255,255,0.15);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:14px;overflow:hidden;margin-bottom:10px;display:none}
.sres.show{display:block}
.sres .i{padding:10px 14px;color:#fff;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04)}

.loc{font-size:.9rem;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between}
.loc .d{font-weight:400;font-size:.75rem;color:rgba(255,255,255,0.5)}
.card{background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:18px;margin-bottom:10px}

.om{font-size:.95rem;font-weight:600;line-height:1.6}
.ot{font-size:.75rem;margin-top:3px;color:rgba(255,255,255,0.7)}
.oq{font-size:.7rem;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.4)}
.fc{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.fc::-webkit-scrollbar{height:2px}
.fc::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:2px}
.fc::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}

.fcc .fi{font-size:1.2rem;margin-bottom:2px}
.fcc .fh{font-size:.75rem;font-weight:600}
.fcc .fl{font-size:.6rem;color:rgba(255,255,255,0.4)}
.ld{display:none;justify-content:center;align-items:center;gap:10px;padding:40px 0;color:rgba(255,255,255,0.6);font-size:.85rem}
.ld.show{display:flex}
.sp{width:24px;height:24px;border:2px solid rgba(255,255,255,0.15);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.er{display:none;padding:14px;text-align:center;color:#ef4444;font-size:.8rem;background:rgba(239,68,68,0.1);border-radius:12px;margin-bottom:10px}
.er.show{display:block}
.ct{display:flex;gap:6px;margin-bottom:6px}

.ctb.active{background:rgba(255,255,255,0.2);color:#fff;border-color:rgba(255,255,255,0.3)}
.pc{width:100%;height:120px}
</style>

<script>

function wxe(c){if(c===0)return'☀️';if(c===1)return'🌤️';if(c===2)return'⛅';if(c===3)return'☁️';if(c>=45&&c<=48)return'🌫️';if(c>=51&&c<=55)return'🌦️';if(c>=56&&c<=67)return'🌧️';if(c>=71&&c<=77)return'❄️';if(c>=80&&c<=82)return'🌦️';if(c>=85&&c<=86)return'🌨️';if(c>=95)return'⛈️';return'🌈';}
function wxd(c){if(c===0)return'晴天';if(c===1)return'晴朗';if(c===2)return'多云';if(c===3)return'阴天';if(c>=45&&c<=48)return'有雾';if(c>=51&&c<=55)return'毛毛雨';if(c>=56&&c<=67)return'下雨';if(c>=71&&c<=77)return'下雪';if(c>=80&&c<=82)return'阵雨';if(c>=85&&c<=86)return'阵雪';if(c>=95)return'雷暴';return'天气';}
function isr(c){return(c>=51&&c<=65)||(c>=80&&c<=82);}
function isno(c){return(c>=71&&c<=77)||(c>=85&&c<=86);}
function qw2wmo(ic){var c=parseInt(ic);if(c>=300&&c<=318||c===399)return 61;if(c>=400&&c<=410||c===456||c===457||c===499)return 71;if(c>=500&&c<=515)return 45;if(c===100||c===150)return 0;if(c===101||c===151)return 1;if(c===102||c===152)return 2;if(c===103||c===153)return 2;if(c===104||c===154)return 3;if(c===900)return 0;if(c===901)return 71;return c;}
function fmtDay(ds){var d=new Date(ds),t=new Date();if(d.toDateString()===t.toDateString())return'今天';t.setDate(t.getDate()+1);if(d.toDateString()===t.toDateString())return'明天';return['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];}
function getOutfit(temp,code,w,h){var T='',B='',O='',CL='',FAB='',SPF='',S='',cat='n',ac=[],tp=[];
 if(isr(code)){cat='rain';T=temp>=25?'白色半袖T恤（速干面料）':'V领长袖打底衫';B=temp>=25?'牛仔A字短裤':'深蓝直筒牛仔裤';S=temp>=25?'厚底凉鞋':'马丁靴';O='米色防水风衣';CL='雨天也要穿得好看✨';FAB='速干透气';SPF='SPF15+';ac.push('☂️ 透明长柄伞');ac.push('👢 防水短靴');tp.push('出门必带伞哦~');}
 else if(isno(code)){cat='snow';T='白色高领羊毛衫';B='黑色加绒打底裤+毛呢短裙';S='加绒雪地靴';O='驼色长款羽绒服';CL='驼+白·冬日暖阳';FAB='羊毛内胆+防风面料';SPF='SPF15(雪地反射)';ac.push('🧣 羊绒围巾');ac.push('🧤 触屏手套');tp.push('下雪路滑·慢慢走~');}
 else if(temp>=35){cat='hot';T='白色V领半袖T恤(冰感纯棉)';B='米色亚麻A字短裤';S='白色平底凉鞋';O='冰丝长款防晒衫';CL='全白/白+米·极致清凉';FAB='冰感纯棉+亚麻';SPF='SPF50+ PA++++';ac.push('👒 宽檐防晒帽');ac.push('🕶️ UV400墨镜');ac.push('😷 冰丝防晒口罩');ac.push('🧴 防水防晒·2h补涂一次');tp.push('暴晒时段10-16点减少外出！');}
 else if(temp>=30){cat='hot';T='淡粉色圆领短袖T恤(纯棉)';B='浅蓝牛仔短裤/百褶裙';S='白色帆布鞋/平底凉拖';O='白色薄款防晒衫';CL='浅粉+浅蓝·甜美清爽';FAB='纯棉透气';SPF='SPF30+ PA+++';ac.push('😷 透气防晒口罩');ac.push('👒 渔夫帽/棒球帽');ac.push('🧴 出门前30分钟涂防晒');tp.push('高温多喝水·注意防暑');}
 else if(temp>=25){T='奶白法式V领短袖衬衫';B='浅蓝高腰直筒牛仔裤';S='白色乐福鞋/帆布鞋';O='米色薄款针织开衫';CL='奶白+牛仔蓝·温柔知性';FAB='纯棉舒适';SPF='SPF30+ PA++';ac.push('🕶️ 金属框墨镜');ac.push('😷 蕾丝花边防晒口罩');tp.push('早晚温差·开衫随身带~');}

 else if(temp>=12){cat='cool';T='灰色宽松连帽卫衣(加绒)';B='黑色高腰阔腿裤';S='黑色马丁靴';O='卡其色中长风衣';CL='灰+黑+卡其·高级大地色';FAB='棉质+摇粒绒内里';tp.push('微凉天气·围巾是点睛之笔');}

 else{T='加绒保暖内衣+羊绒高领衫';B='加绒加厚打底裤+毛呢长裙';S='加绒雪地靴';O='长款连帽鹅绒羽绒服';CL='黑+深蓝·保暖不臃肿';FAB='鹅绒填充+防风面料';ac.push('🧣 加厚羊绒围巾');ac.push('🧤 加绒触屏手套');ac.push('🐻 毛绒耳罩');tp.push('🥶 极寒天气·全副武装再出门！');}
 if(w>25&&temp<18)tp.push('风大建议防风外套');
 return{main:T+'，'+B+'。'+O,ac:ac,tp:tp,c:cat};}

async function geocode(q){var u='https://restapi.amap.com/v3/geocode/geo?key='+AMAP_KEY+'&address='+encodeURIComponent(q)+'&city=&output=json';var r=await fetch(u);if(!r.ok)throw new Error('搜索失败');var d=await r.json();if(d.status!=='1'||!d.geocodes||!d.geocodes.length)throw new Error('未找到地点');return d.geocodes.map(function(g){var p=g.location.split(',');return{name:g.formatted_address||g.address||q,lat:parseFloat(p[1]),lon:parseFloat(p[0])};});}
async function getWeather(lt,ln){var loc=ln+','+lt;var ress=await Promise.all([fetch('https://'+baseHost+'/v7/weather/now?location='+loc,{headers:hdrs}),fetch('https://'+baseHost+'/v7/weather/7d?location='+loc,{headers:hdrs}),fetch('https://'+baseHost+'/v7/air/now?location='+loc,{headers:hdrs}).catch(function(){return{ok:false}}),fetch('https://'+baseHost+'/v7/weather/24h?location='+loc,{headers:hdrs}).catch(function(){return{ok:false}})]);var nr=ress[0],fr=ress[1],ar=ress[2],hr=ress[3];if(!nr.ok||!fr.ok)throw new Error('数据获取失败');var nd=await nr.json(),fd=await fr.json();if(nd.code!=='200'||fd.code!=='200')throw new Error('API错误');var n=nd.now,d=fd.daily;var aqi=null,hourly=[];if(ar&&ar.ok){try{var ad=await ar.json();if(ad.code==='200'&&ad.now)aqi={v:parseInt(ad.now.aqi),l:ad.now.level};}catch(e){}}if(hr&&hr.ok){try{var hd=await hr.json();if(hd.code==='200'&&hd.hourly){hourly=hd.hourly.slice(0,24).map(function(h){return{time:h.fxTime,temp:parseFloat(h.temp),precip:parseFloat(h.precip||0)};});}}catch(e){}}
 return{current:{temp:parseFloat(n.temp),feels:parseFloat(n.feelsLike),code:qw2wmo(n.icon),precip:parseFloat(n.precip||0),wind:parseFloat(n.windSpeed),hum:parseFloat(n.humidity)},daily:{time:d.map(function(dd){return dd.fxDate;}),max:d.map(function(dd){return parseFloat(dd.tempMax);}),min:d.map(function(dd){return parseFloat(dd.tempMin);}),code:d.map(function(dd){return qw2wmo(dd.iconDay);}),precip:d.map(function(dd){return parseFloat(dd.precip||0);}),wind:d.map(function(dd){return parseFloat(dd.windSpeedDay||0);}),hum:d.map(function(dd){return parseFloat(dd.humidity||0);}),sunrise:d.map(function(dd){return dd.sunrise||'';}),sunset:d.map(function(dd){return dd.sunset||'';}),uv:d.map(function(dd){return dd.uvIndex||'-';})},aqi:aqi,hourly:hourly};}
function showLoading(){loading.classList.add('show');errorMsg.classList.remove('show');mainContent.style.display='none'}
function hideLoading(){loading.classList.remove('show')}
function showError(m){errorMsg.textContent=m;errorMsg.classList.add('show');hideLoading()}
function saveLoc(lt,ln,nm){try{localStorage.setItem('woloc',JSON.stringify({lat:lt,lon:ln,name:nm}))}catch(e){}}
function loadLoc(){try{return JSON.parse(localStorage.getItem('woloc'))}catch(e){return null}}
var qts=['你今天更加漂亮了✨','穿什么都好看的你💖','今天的你闪闪发光💫','自信的你最美🌸','今天好运会找到你🍀','你的笑容是最好的配饰😊','做最好的自己🌟','今天也要开开心心🌈','轻盈自在的一天🦋','阳光和你都很耀眼☀️','就喜欢你自信的样子💪','愿你今天被温柔以待💐'];
function getQ(){return qts[Math.floor((new Date()-new Date(2025,0,1))/86400000)%qts.length];}
function renderWeather(data){
 mainContent.style.display='block';var c=data.current,d=data.daily;var t=Math.round(c.temp),fc=c.code;
 document.getElementById('temp').textContent=t;
 document.getElementById('desc').innerHTML='<span>'+wxe(fc)+' '+wxd(fc)+' · 体感 '+Math.round(c.feels)+'°C</span>';
 document.getElementById('wicon').textContent=wxe(fc);
 document.getElementById('humidVal').textContent=c.hum+'%';
 var sr=d.sunrise&&d.sunrise[0]?d.sunrise[0]:'--';
 var ss=d.sunset&&d.sunset[0]?d.sunset[0]:'--';
 document.getElementById('sunriseVal').textContent=sr;
 document.getElementById('sunsetVal').textContent=ss;
 document.getElementById('uvVal').textContent=d.uv&&d.uv[0]&&d.uv[0]!=='-'?d.uv[0]:'--';
 if(data.aqi)document.getElementById('aqiVal').innerHTML=data.aqi.v+' <span style="font-size:0.6rem;opacity:0.6">'+data.aqi.l+'</span>';
 else document.getElementById('aqiVal').textContent='--';
 var outfit=getOutfit(t,fc,c.wind,c.hum);
 document.getElementById('outfitMain').textContent=outfit.main;
 var tipsDiv=document.getElementById('outfitTips');tipsDiv.innerHTML='';
 if(outfit.CL)tipsDiv.innerHTML+='<div class="ot">🎨 '+outfit.CL+'</div>';
 if(outfit.FAB)tipsDiv.innerHTML+='<div class="ot">🧵 '+outfit.FAB+'</div>';
 if(outfit.S)tipsDiv.innerHTML+='<div class="ot">👡 '+outfit.S+'</div>';
 if(outfit.SPF)tipsDiv.innerHTML+='<div class="ot">🧴 '+outfit.SPF+'</div>';
 outfit.tp.forEach(function(tx){tipsDiv.innerHTML+='<div class="ot">💡 '+tx+'</div>';});
 outfit.ac.forEach(function(ax){tipsDiv.innerHTML+='<div class="ot">✨ '+ax+'</div>';});
 document.getElementById('dailyQuote').textContent='💬 '+getQ();
 forecastDays=[];var fcDiv=document.getElementById('forecast');fcDiv.innerHTML='';
 for(var i=0;i<Math.min(7,d.time.length);i++){
  var mx=Math.round(d.max[i]),mn=Math.round(d.min[i]),cd=d.code[i];
  var pw=d.precip[i]||0,wd=Math.round((d.wind[i]||0)/3.6*10)/10,hm=d.hum[i]||0;
  var sr2=d.sunrise?d.sunrise[i]:'',ss2=d.sunset?d.sunset[i]:'',uv2=d.uv?d.uv[i]:'-';
  forecastDays.push({max:mx,min:mn,code:cd,precip:pw,wind:wd,hum:hm,sunrise:sr2,sunset:ss2,uv:uv2});
  fcDiv.innerHTML+='<div class="fcc'+(i===0?' active':'')+'" data-idx="'+i+'" onclick="showFcDay('+i+')"><div class="fd">'+fmtDay(d.time[i])+'</div><div class="fi">'+wxe(cd)+'</div><div class="fh">'+mx+'° <span class="fl">'+mn+'°</span></div></div>';
 }
 todayData={temp:t,feels:c.feels,code:fc,wind:c.wind,hum:c.hum,precip:c.precip,hourly:data.hourly||[]};drawPrecipChart(data.hourly||[]);hideLoading();}
var chartMode="temp";
function switchChart(m){chartMode=m;document.getElementById("btnTemp").classList.toggle("active",m==="temp");document.getElementById("btnPrecip").classList.toggle("active",m==="precip");if(todayData&&todayData.hourly)drawPrecipChart(todayData.hourly);}
function drawPrecipChart(hourly){var canvas=document.getElementById("precipChart");var card=document.getElementById("precipCard");
 if(!canvas||!hourly.length){if(card)card.style.display="none";return;}if(card)card.style.display="block";
 var dpr=window.devicePixelRatio||1;
 var wrapEl=document.querySelector(".wrap");var W=(wrapEl?wrapEl.clientWidth:360)-36;var H=140;
 canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+"px";canvas.style.height=H+"px";
 var ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
 var pad={t:10,b:16,l:28,r:8};var cw=W-pad.l-pad.r;var ch=H-pad.t-pad.b;
 var selIdx=-1;document.querySelectorAll('.fcc.active').forEach(function(el){selIdx=parseInt(el.dataset.idx)||0;});
if(selIdx!==0&&chartMode==='temp'){
  var dd=forecastDays[selIdx];
  if(dd){
    var highT=dd.max,lowT=dd.min,rangeT=highT-lowT||1;
    for(var i=0;i<=3;i++){var y=pad.t+(ch/3)*i;ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='8px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText(Math.round(highT-(highT-lowT)/3*i)+' deg ',pad.l-4,y);}
    ctx.beginPath();ctx.strokeStyle='#FF9800';ctx.lineWidth=2.5;
    for(var h=0;h<=24;h++){
      var t;
      if(h<=6)t=lowT+(highT-lowT)*h/12;
      else if(h<=14)t=highT-(highT-lowT)*(h-6)/18;
      else t=highT-(highT-lowT)*0.33-(highT-lowT)*(h-14)/30;
      var cx=pad.l+(cw/24)*h;
      var cy=pad.t+ch-((t-lowT)/rangeT)*ch;
      if(h===0)ctx.moveTo(cx,cy);else ctx.lineTo(cx,cy);
    }
    ctx.stroke();
    var labelHours=[3,6,9,12,15,18,21];
    labelHours.forEach(function(h){
      var t;
      if(h<=6)t=lowT+(highT-lowT)*h/12;
      else if(h<=14)t=highT-(highT-lowT)*(h-6)/18;
      else t=highT-(highT-lowT)*0.33-(highT-lowT)*(h-14)/30;
      var cx=pad.l+(cw/24)*h;
      var cy=pad.t+ch-((t-lowT)/rangeT)*ch;
      ctx.beginPath();ctx.arc(cx,cy,4,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();
      ctx.beginPath();ctx.arc(cx,cy,2.5,0,2*Math.PI);ctx.fillStyle='#FF9800';ctx.fill();
      if(h%3===0){
        ctx.fillStyle='#fff';ctx.font='bold 8px sans-serif';ctx.textAlign='center';ctx.fillText(Math.round(t)+' deg ',cx,cy-9);
      }
    });
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='7px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
    for(var h=0;h<=24;h+=3)ctx.fillText(h+'h',pad.l+(cw/24)*h,pad.t+ch+4);
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='italic 11px sans-serif';ctx.textAlign='center';ctx.fillText('... '+dd.min+' deg ~'+dd.max+' deg ...',W/2,pad.t+ch+18);
  }
}else{
 if(chartMode==='precip'){
 if(chartMode==="precip"){
 var vals=hourly.map(function(h){return h.precip||0});var maxV=Math.max.apply(null,vals)||1;
 maxV=Math.ceil(maxV/5)*5;if(maxV===0)maxV=5;
 for(var i=0;i<=3;i++){var y=pad.t+(ch/3)*i;ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle="rgba(255,255,255,0.4)";ctx.font="8px sans-serif";ctx.textAlign="right";ctx.textBaseline="middle";ctx.fillText(Math.round(maxV-(maxV/3)*i)+"mm",pad.l-4,y);}
 var barW=Math.max(3,cw/hourly.length-2);var x=pad.l;
 for(var i=0;i<hourly.length;i++){var hh=((vals[i]||0)/maxV)*ch;var yy=pad.t+ch-hh;ctx.fillStyle="rgba(116,185,255,0.7)";ctx.fillRect(x,yy,barW,hh);ctx.fillStyle="rgba(255,255,255,0.3)";ctx.fillRect(x,yy,barW,1);x+=cw/hourly.length;}
 ctx.fillStyle="rgba(255,255,255,0.4)";ctx.font="10px sans-serif";ctx.textAlign="center";ctx.fillText("降水(mm)",W-pad.r,pad.t-2);}
 else{
 var temps=hourly.map(function(h){return h.temp||0});var minT=Math.floor(Math.min.apply(null,temps))-2;var maxT=Math.ceil(Math.max.apply(null,temps))+2;var range=maxT-minT||1;
 for(var i=0;i<=4;i++){var y=pad.t+(ch/4)*i;ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle="rgba(255,255,255,0.4)";ctx.font="8px sans-serif";ctx.textAlign="right";ctx.textBaseline="middle";ctx.fillText(Math.round(maxT-(range/4)*i)+"°",pad.l-4,y);}
 ctx.beginPath();ctx.strokeStyle="#FF6B6B";ctx.lineWidth=2;ctx.shadowColor="rgba(255,107,107,0.3)";ctx.shadowBlur=4;
 for(var i=0;i<hourly.length;i++){var ex=pad.l+(cw/(hourly.length-1))*i;var ey=pad.t+ch-((temps[i]-minT)/range)*ch;if(i===0)ctx.moveTo(ex,ey);else ctx.lineTo(ex,ey);}
 ctx.stroke();ctx.shadowBlur=0;
 var grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);grad.addColorStop(0,"rgba(255,107,107,0.2)");grad.addColorStop(1,"rgba(255,107,107,0)");ctx.lineTo(pad.l+cw,pad.t+ch);ctx.lineTo(pad.l,pad.t+ch);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
 for(var i=0;i<hourly.length;i+=Math.max(1,Math.floor(hourly.length/8))){var ex=pad.l+(cw/(hourly.length-1))*i;var ey=pad.t+ch-((temps[i]-minT)/range)*ch;ctx.beginPath();ctx.arc(ex,ey,3,0,2*Math.PI);ctx.fillStyle="#fff";ctx.fill();ctx.fillStyle="#FF6B6B";ctx.beginPath();ctx.arc(ex,ey,2,0,2*Math.PI);ctx.fill();ctx.fillStyle="#fff";ctx.font="bold 9px sans-serif";ctx.textAlign="center";ctx.fillText(Math.round(temps[i])+"°",ex,ey-10);}
 ctx.fillStyle="rgba(255,255,255,0.4)";ctx.font="10px sans-serif";ctx.textAlign="left";ctx.fillText("气温(°C)",pad.l,pad.t-2);}
 ctx.fillStyle="rgba(255,255,255,0.3)";ctx.font="7px sans-serif";ctx.textAlign="center";ctx.textBaseline="top";
 var step=Math.max(1,Math.floor(hourly.length/8));
 for(var i=0;i<hourly.length;i+=step){var lx=pad.l+(cw/(hourly.length-1))*i;ctx.fillText(Math.round(i*24/hourly.length)+'h',lx,pad.t+ch+4);}
 var selIdx=-1;document.querySelectorAll(".fcc.active").forEach(function(el){selIdx=parseInt(el.dataset.idx)||0});
 if(selIdx===0){ctx.fillStyle="rgba(255,255,255,0.6)";ctx.font="10px sans-serif";ctx.textAlign="center";ctx.fillText("选中: 今天 · 24h"+(chartMode==="temp"?"逐时气温":"逐时降水"),W/2,10);}}
 document.getElementById("precipCard").style.display="block";}}
function showFcDay(idx){
 if(idx<0||idx>=forecastDays.length)return;
 var day=forecastDays[idx];
 document.querySelectorAll('.fcc').forEach(function(el){el.classList.toggle('active',parseInt(el.dataset.idx)===idx);});
 var at=Math.round((day.max+day.min)/2);
 document.getElementById('temp').textContent=at;
 document.getElementById('desc').innerHTML='<span>'+wxe(day.code)+' '+wxd(day.code)+' · '+day.min+'~'+day.max+'°C</span>';
 document.getElementById('wicon').textContent=wxe(day.code);
 document.getElementById('sunriseVal').textContent=day.sunrise||'--';
 document.getElementById('sunsetVal').textContent=day.sunset||'--';
 document.getElementById('uvVal').textContent=day.uv||'--';
 document.getElementById('aqiVal').textContent=idx===0?'今日':'预估';
 document.getElementById('humidVal').textContent=day.hum+'%';
 document.getElementById('uvVal').textContent='--';
 var outfit=getOutfit(at,day.code,day.wind,day.hum);
 document.getElementById('outfitMain').textContent=outfit.main;
 document.getElementById('outfitTips').innerHTML='';
 if(outfit.CL)document.getElementById('outfitTips').innerHTML+='<div class="ot">🎨 '+outfit.CL+'</div>';
 if(outfit.FAB)document.getElementById('outfitTips').innerHTML+='<div class="ot">🧵 '+outfit.FAB+'</div>';
 if(outfit.S)document.getElementById('outfitTips').innerHTML+='<div class="ot">👡 '+outfit.S+'</div>';
 if(outfit.SPF)document.getElementById('outfitTips').innerHTML+='<div class="ot">🧴 '+outfit.SPF+'</div>';
 outfit.tp.forEach(function(tx){document.getElementById('outfitTips').innerHTML+='<div class="ot">💡 '+tx+'</div>';});
 outfit.ac.forEach(function(ax){document.getElementById('outfitTips').innerHTML+='<div class="ot">✨ '+ax+'</div>';});if(todayData&&todayData.hourly)drawPrecipChart(todayData.hourly);}
async function ss(q){sres.classList.remove('show');showLoading();
 try{var r=await geocode(q);if(!r.length){showError('未找到地点');return}var b=r[0];var sn=b.name.split(',')[0].trim();locName.textContent=sn;saveLoc(b.lat,b.lon,sn);var w=await getWeather(b.lat,b.lon);renderWeather(w);}catch(e){showError('获取失败：'+e.message);}}
searchBtn.onclick=function(){var q=searchInput.value.trim();if(q)ss(q);};
locateBtn.onclick=function(){
 if(!navigator.geolocation){showError('不支持定位');return}
 navigator.geolocation.getCurrentPosition(function(pos){searchInput.value='';showLoading();
  var lt=pos.coords.latitude,ln=pos.coords.longitude;
  fetch('https://restapi.amap.com/v3/geocode/regeo?key='+AMAP_KEY+'&location='+ln+','+lt+'&output=json&radius=1000')
   .then(function(r){return r.json()}).then(function(d){
    var addr=d.regeocode?d.regeocode.addressComponent:{};
    var nm=(addr.city||addr.province||addr.district||'我的位置');
    locName.textContent=nm;saveLoc(lt,ln,nm);return getWeather(lt,ln);
   }).then(renderWeather).catch(function(e){showError(e.message);});
 },function(){showError('定位失败')},{enableHighAccuracy:true,timeout:10000});};
searchInput.onkeydown=function(e){if(e.key==='Enter'){var q=searchInput.value.trim();if(q)ss(q);}};
var st;
searchInput.oninput=function(){clearTimeout(st);var q=searchInput.value.trim();
 if(q.length<2){sres.classList.remove('show');return}
 st=setTimeout(async function(){try{var r=await geocode(q);sres.innerHTML='';
  r.forEach(function(b,i){var p=b.name.split(','),mm=p[0],rr=p.slice(1).join('，');
   var el=document.createElement('div');el.className='i';el.innerHTML='<div style="font-weight:500">'+mm+'</div><div style="font-size:0.65rem;opacity:0.6">'+rr+'</div>';
   el.onclick=function(){locName.textContent=mm;saveLoc(b.lat,b.lon,mm);showLoading();sres.classList.remove('show');searchInput.value=mm;getWeather(b.lat,b.lon).then(renderWeather).catch(function(e){showError(e.message);});};
   sres.appendChild(el);});sres.classList.add('show');}catch(e){sres.classList.remove('show')}},400);};
document.addEventListener('click',function(e){if(!e.target.closest('.sr')&&!e.target.closest('.sres'))sres.classList.remove('show');});
(function(){
 document.getElementById('dateDisp').textContent=(new Date().getMonth()+1)+'/'+(new Date().getDate());
 if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
 var saved=loadLoc();
 if(saved){locName.textContent=saved.name;showLoading();getWeather(saved.lat,saved.lon).then(renderWeather).catch(function(){hideLoading();locName.textContent='选择位置';});}
})();
</script>
