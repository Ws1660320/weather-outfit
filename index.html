<head>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, system-ui, "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh; padding: 16px;
  }
  .phone {
    max-width: 390px; margin: 0 auto;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 32px; padding: 20px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    position: relative; overflow: hidden;
  }
  .phone::before {
    content: ''; position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  /* === 顶部 === */
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; position: relative; z-index: 1; }
  .top-bar .city { color: #fff; font-size: 0.95rem; font-weight: 600; }
  .top-bar .city span { opacity: 0.7; font-weight: 400; }
  .top-bar .date { color: rgba(255,255,255,0.7); font-size: 0.75rem; }
  .search-icon { width: 32px; height: 32px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); cursor: pointer; }

  /* Search */
  .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .glass-input { flex: 1; background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 10px 16px; color: #fff; outline: none; font-size: 0.85rem; font-family: inherit; }
  .glass-input::placeholder { color: rgba(255,255,255,0.4); }
  .glass-btn { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 10px 14px; color: #fff; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; font-family: inherit; white-space: nowrap; }
  .glass-btn:active { transform: scale(0.95); }

  /* Search results */
  .search-results { background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; overflow: hidden; margin-bottom: 10px; display: none; }
  .search-results.show { display: block; }
  .search-results .sr-item { padding: 10px 14px; color: #fff; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .search-results .sr-item:last-child { border-bottom: none; }
  .search-results .sr-item:hover { background: rgba(255,255,255,0.1); }

  /* Loading & Error */
  .loading { display: none; justify-content: center; align-items: center; gap: 10px; padding: 20px 0; color: rgba(255,255,255,0.6); font-size: 0.85rem; }
  .loading.show { display: flex; }
  .spinner { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.15); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { display: none; padding: 14px; text-align: center; color: #ef4444; font-size: 0.8rem; background: rgba(239,68,68,0.1); border-radius: 12px; margin-bottom: 10px; }
  .error-msg.show { display: block; }

  /* === 主信息区 === */
  .main-info {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 20px;
    margin-bottom: 12px; position: relative; z-index: 1;
  }
  .main-info .temp-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .main-info .temp-big { font-size: 3.5rem; font-weight: 200; color: #fff; line-height: 1; }
  .main-info .temp-unit { font-size: 1.2rem; font-weight: 300; opacity: 0.6; }
  .main-info .weather-icon-big { font-size: 2.8rem; opacity: 0.8; }
  .main-info .desc { color: rgba(255,255,255,0.9); font-size: 0.9rem; margin: 4px 0 12px; }
  .main-info .desc span { opacity: 0.6; }

  .info-strip {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px;
  }
  .info-strip > div {
    text-align: center; padding: 8px 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px; border: 1px solid rgba(255,255,255,0.06);
  }
  .info-strip .val { color: #fff; font-size: 0.8rem; font-weight: 600; }
  .info-strip .lbl { color: rgba(255,255,255,0.5); font-size: 0.6rem; margin-top: 2px; }

  /* === 穿搭 + 场景融合 === */
  .outfit-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; padding: 16px;
    margin-bottom: 12px; position: relative; z-index: 1;
  }
  .outfit-card .outfit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .outfit-card .outfit-header span { color: rgba(255,255,255,0.5); font-size: 0.7rem; }
  .outfit-card .outfit-main { color: #fff; font-size: 1rem; font-weight: 600; line-height: 1.6; }
  .outfit-card .outfit-tip { color: rgba(255,255,255,0.7); font-size: 0.78rem; margin-top: 4px; padding-left: 12px; position: relative; }
  .outfit-card .outfit-tip::before { content: ''; position: absolute; left: 0; top: 50%; width: 4px; height: 4px; background: rgba(255,255,255,0.4); border-radius: 50%; transform: translateY(-50%); }
  .outfit-card .outfit-quote { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 0.75rem; color: rgba(255,255,255,0.5); }

  /* === 预报 Tab === */
  .tab-bar {
    display: flex; gap: 4px; margin-bottom: 12px; position: relative; z-index: 1;
  }
  .tab-bar > div {
    flex: 1; text-align: center; padding: 10px 4px;
    border-radius: 12px; font-size: 0.75rem; font-weight: 500;
    color: rgba(255,255,255,0.6); cursor: pointer;
    transition: all 0.3s; background: rgba(255,255,255,0.05);
  }
  .tab-bar > div.active {
    background: rgba(255,255,255,0.2);
    color: #fff;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  /* === 预报卡片（核心改进） === */
  .forecast-section {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 14px;
    position: relative; z-index: 1;
    transition: all 0.3s;
  }
  .forecast-section .section-title { color: rgba(255,255,255,0.5); font-size: 0.7rem; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }

  .forecast-scroll {
    display: flex; gap: 6px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; padding-bottom: 4px;
  }
  .forecast-scroll::-webkit-scrollbar { height: 2px; }
  .forecast-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 2px; }
  .forecast-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  .fc-card {
    flex-shrink: 0; width: 72px; padding: 12px 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 14px; text-align: center; cursor: pointer;
    transition: all 0.3s; border: 1px solid transparent;
  }
  .fc-card:hover { background: rgba(255,255,255,0.1); }
  .fc-card.active {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.3);
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    transform: scale(1.05);
  }
  .fc-card .day { font-size: 0.65rem; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
  .fc-card .icon { font-size: 1.3rem; margin-bottom: 2px; }
  .fc-card .high { font-size: 0.8rem; font-weight: 600; color: #fff; }
  .fc-card .low { font-size: 0.65rem; color: rgba(255,255,255,0.4); }

  .fc-card.active .day { color: rgba(255,255,255,0.8); }

  /* === 选中天的详情 === */
  .day-detail {
    margin-top: 12px; padding: 14px;
    background: rgba(255,255,255,0.06);
    border-radius: 14px; border: 1px solid rgba(255,255,255,0.06);
    min-height: 60px; transition: all 0.3s;
  }
  .day-detail .dd-row { display: flex; justify-content: space-between; align-items: center; }
  .day-detail .dd-temp { color: #fff; font-size: 2rem; font-weight: 200; }
  .day-detail .dd-desc { color: rgba(255,255,255,0.8); font-size: 0.85rem; }
  .day-detail .dd-outfit { color: rgba(255,255,255,0.9); font-size: 0.82rem; font-weight: 500; margin-top: 6px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.06); }
  .day-detail .dd-info { display: flex; gap: 8px; margin-top: 6px; }
  .day-detail .dd-info span { font-size: 0.7rem; color: rgba(255,255,255,0.5); }

  /* 底部 tab */
  .bottom-nav {
    display: flex; justify-content: space-around; margin-top: 16px;
    position: relative; z-index: 1;
  }
  .bottom-nav > span { font-size: 0.7rem; color: rgba(255,255,255,0.3); padding: 6px; }

  /* 场景 Demo: 不同天气的选中效果 */
  .demo-controls { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .demo-controls span {
    font-size: 0.6rem; padding: 3px 8px; border-radius: 6px;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); cursor: pointer;
  }
  .demo-controls span.active-demo { background: rgba(255,255,255,0.25); color: #fff; }

  .note {
    max-width: 390px; margin: 20px auto 0;
    text-align: center; font-size: 0.75rem; color: rgba(255,255,255,0.3);
    line-height: 1.6;
  }
</style>
</head>

  const outfitData = {

    4: { temp: '18°/13°', desc: '☁️ 阴天', rain:'无降水', wind:'3.8m/s', hum:'70%', outfit:'卫衣 + 休闲裤，层次穿搭', tip1:'阴天紫外线仍在，注意防晒', tip2:'适合露营或散步'},
    5: { temp: '22°/15°', desc: '☀️ 晴', rain:'无降水', wind:'2.5m/s', hum:'55%', outfit:'衬衫 + 薄外套 + 牛仔裤', tip1:'天气回暖，适合踏青', tip2:'白天舒适，傍晚微凉'},
    6: { temp: '23°/17°', desc: '⛅ 晴转多云', rain:'无降水', wind:'3.0m/s', hum:'58%', outfit:'针织开衫 + T恤 + 长裤', tip1:'温度和湿度适宜', tip2:'推荐洋葱式穿搭法'},
  };

  function selectDay(idx) {
    document.querySelectorAll('.fc-card').forEach(function(el) {
      el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
    });
    var data = outfitData[idx];
    var d = document.getElementById('dayDetail');
    var dayNames = ['今天', '周四', '周五', '周六', '周日', '周一', '周二'];
    var dates = ['5月22日', '5月23日', '5月24日', '5月25日', '5月26日', '5月27日', '5月28日'];
    d.innerHTML = '<div class="dd-row"><div><div style="color:rgba(255,255,255,0.5);font-size:0.7rem">' + dayNames[idx] + ' · ' + dates[idx] + '</div><div class="dd-temp">' + data.temp + '</div></div><div style="text-align:right"><div class="dd-desc">' + data.desc + '</div></div></div><div class="dd-outfit">👗 <span id="ddOutfitText">' + data.outfit + '</span></div><div class="dd-info"><span>💧 ' + data.rain + '</span><span>💨 ' + data.wind + '</span><span>💦 ' + data.hum + '</span></div>';

    selectDay(idx);
    document.querySelectorAll('.demo-controls span').forEach(function(el) {
      el.classList.toggle('active-demo', parseInt(el.dataset.demo) === idx);
    });
  }
</script>

<script>


    // ==================== 专属穿搭助手 — 核心逻辑 ====================

    // DOM elements
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const locateBtn = document.getElementById('locateBtn');
    const searchResults = document.getElementById('searchResults');
    const locationName = document.getElementById('locationName');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('errorMsg');
    const weatherCard = document.getElementById('mainContent');
    const outfitCard = document.getElementById('outfitCard');
    const forecast = document.getElementById('forecast');

    // Tab 切换
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === name); });
      document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.toggle('active', c.id === 'tab-' + name); });
    }

    // 预报数据存储
    var forecastDays = [];
    var todayData = null;

    // ==================== API 配置 ====================
    // !! 请替换下面的 Key 为你自己的 !!
    // 高德地图: https://lbs.amap.com/ (注册 → 应用管理 → 创建新应用 → 添加 Key)
    // 和风天气: https://dev.qweather.com/ (注册 → 创建应用 → 获取 Key)
    const AMAP_KEY = '477195416ac8d4105cc6ab0f522d600e';
    const QWEATHER_KEY = 'f0e2252fea8b4696b3df33e116728cf8';

    // ==================== 天气代码映射 ====================
    function getWeatherEmoji(code) {
      if (code === 0) return '☀️';
      if (code === 1) return '🌤️';
      if (code === 2) return '⛅';
      if (code === 3) return '☁️';
      if (code >= 45 && code <= 48) return '🌫️';
      if (code >= 51 && code <= 55) return '🌦️';
      if (code >= 56 && code <= 57) return '🌧️';
      if (code >= 61 && code <= 65) return '🌧️';
      if (code >= 66 && code <= 67) return '🌧️';
      if (code >= 71 && code <= 77) return '❄️';
      if (code >= 80 && code <= 82) return '🌦️';
      if (code >= 85 && code <= 86) return '🌨️';
      if (code >= 95) return '⛈️';
      return '🌈';
    }

    function getWeatherDesc(code) {
      if (code === 0) return '晴天';
      if (code === 1) return '大部晴朗';
      if (code === 2) return '多云';
      if (code === 3) return '阴天';
      if (code >= 45 && code <= 48) return '有雾';
      if (code >= 51 && code <= 55) return '毛毛雨';
      if (code >= 56 && code <= 57) return '冻雨';
      if (code >= 61 && code <= 65) return '下雨';
      if (code >= 66 && code <= 67) return '冻雨';
      if (code >= 71 && code <= 77) return '下雪';
      if (code >= 80 && code <= 82) return '阵雨';
      if (code >= 85 && code <= 86) return '阵雪';
      if (code >= 95) return '雷暴';
      return '未知';
    }

    function isRainCode(code) {
      return (code >= 51 && code <= 67) || (code >= 80 && code <= 82) || code >= 95;
    }

    function isSnowCode(code) {
      return (code >= 71 && code <= 77) || (code >= 85 && code <= 86);
    }

    // ==================== 和风天气 icon → WMO 编码映射 ====================
    function qweatherIconToWMO(icon) {
      const code = parseInt(icon);
      if (code === 100 || code === 150) return 0;        // 晴
      if (code === 101 || code === 151) return 1;        // 少云
      if (code === 102 || code === 152) return 2;        // 多云
      if (code === 103 || code === 153) return 2;
      if (code === 104) return 3;                         // 阴
      if ((code >= 500 && code <= 502) || (code >= 509 && code <= 514) || code === 515) return 45; // 雾/霾
      if (code >= 503 && code <= 508) return 48;          // 沙尘
      if (code >= 300 && code <= 302) return 51;          // 毛毛雨
      if (code >= 303 && code <= 304) return 95;          // 雷阵雨

      if (code >= 403 && code <= 404) return 73;          // 中雪/大雪
      if (code >= 405 && code <= 499) return 75;          // 暴雪+
      if (code >= 408 && code <= 409) return 66;          // 雨夹雪
      if (code === 456 || code === 457) return 66;

    }

    // ==================== API 调用 ====================
    async function geocode(query) {
      const url = `https://restapi.amap.com/v3/geocode/geo?key=${AMAP_KEY}&address=${encodeURIComponent(query)}&city=&output=json`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('地址搜索失败');
      const data = await res.json();
      if (data.status !== '1' || !data.geocodes || data.geocodes.length === 0) {
        throw new Error('未找到该地点');
      }
      return data.geocodes.map(d => {
        const [lng, lat] = d.location.split(',');
        return {
          name: d.formatted_address || d.address || query,
          lat: parseFloat(lat),
          lon: parseFloat(lng),
          type: d.level || 'city',
        };
      });
    }

    async function getWeather(lat, lon) {
      const location = `${lon},${lat}`;
      const baseHost = 'pf6vhgwgnj.re.qweatherapi.com';
      const nowUrl = `https://${baseHost}/v7/weather/now?location=${location}`;
      const forecastUrl = `https://${baseHost}/v7/weather/7d?location=${location}`;
      const hourlyUrl = `https://${baseHost}/v7/weather/24h?location=${location}`;
      const indicesUrl = `https://${baseHost}/v7/indices/1d?type=1,2,3,5,8,9&location=${location}`;
      const airUrl = `https://${baseHost}/v7/air/now?location=${location}`;
      const headers = { 'X-QW-Api-Key': QWEATHER_KEY };

      const [nowRes, forecastRes, hourlyRes, indicesRes, airRes] = await Promise.all([
        fetch(nowUrl, { headers }),
        fetch(forecastUrl, { headers }),
        fetch(hourlyUrl, { headers }).catch(() => ({ ok: false })),
        fetch(indicesUrl, { headers }).catch(() => ({ ok: false })),
        fetch(airUrl, { headers }).catch(() => ({ ok: false }))
      ]);

      if (!nowRes.ok || !forecastRes.ok) throw new Error('天气数据获取失败');

      const nowData = await nowRes.json();
      const forecastData = await forecastRes.json();

      if (nowData.code !== '200') throw new Error('当前天气获取失败');
      if (forecastData.code !== '200') throw new Error('天气预报获取失败');

      const n = nowData.now;
      const d = forecastData.daily;

      // 处理小时预报
      var hourly = [];
      if (hourlyRes && hourlyRes.ok) {
        try { var hd = await hourlyRes.json();
          if (hd.code === '200' && hd.hourly) {
            hourly = hd.hourly.slice(0,24).map(function(h) { return {
              time: h.fxTime, temp: parseFloat(h.temp), weather_code: qweatherIconToWMO(h.icon) };});
          }
        } catch(e) {} }

      // 处理生活指数
      var indices = [];
      if (indicesRes && indicesRes.ok) {
        try { var id = await indicesRes.json();
          if (id.code === '200' && id.daily) {
            indices = id.daily.map(function(d2) { return {
              name: d2.name, level: d2.level, category: d2.category, text: d2.text };});
          }
        } catch(e) {} }

      // 处理空气质量
      var aqi = null;
      if (airRes && airRes.ok) {
        try { var ad = await airRes.json();
          if (ad.code === '200' && ad.now) {
            aqi = { value: parseInt(ad.now.aqi), level: ad.now.level, pm25: parseInt(ad.now.pm2p5), pm10: parseInt(ad.now.pm10) };
          }
        } catch(e) {} }

      return {
        current: {
          temperature_2m: parseFloat(n.temp),
          apparent_temperature: parseFloat(n.feelsLike),
          weather_code: qweatherIconToWMO(n.icon),
          precipitation: parseFloat(n.precip || 0),
          wind_speed_10m: parseFloat(n.windSpeed),
          relative_humidity_2m: parseFloat(n.humidity),
        },
        daily: {
          time: d.map(function(day) { return day.fxDate; }),
          temperature_2m_max: d.map(function(day) { return parseFloat(day.tempMax); }),
          temperature_2m_min: d.map(function(day) { return parseFloat(day.tempMin); }),
          weather_code: d.map(function(day) { return qweatherIconToWMO(day.iconDay); }),
          precipitation_sum: d.map(function(day) { return parseFloat(day.precip || 0); }),
          wind_speed: d.map(function(day) { return parseFloat(day.windSpeedDay || 0); }),
          humidity: d.map(function(day) { return parseFloat(day.humidity || 0); }),
          sunrise: d.map(function(day) { return day.sunrise || ''; }),
          sunset: d.map(function(day) { return day.sunset || ''; }),
        },
        hourly: hourly,
        indices: indices,
        aqi: aqi,
      };
    }

    async function reverseGeocode(lat, lon) {
      const url = `https://restapi.amap.com/v3/geocode/regeo?key=${AMAP_KEY}&location=${lon},${lat}&output=json&radius=1000`;
      const res = await fetch(url);
      if (!res.ok) return null;
      const data = await res.json();
      if (data.status !== '1') return null;
      return data.regeocode.formatted_address || null;
    }

      const date = new Date(dateStr);
      const today = new Date();
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);

      if (date.toDateString() === today.toDateString()) return '今天';
      if (date.toDateString() === tomorrow.toDateString()) return '明天';
      const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      return days[date.getDay()];
    }

    function drawHourlyChart(hourly) {
      var canvas = document.getElementById('hourlyChart');
      var container = canvas.parentElement;
      var dpr = window.devicePixelRatio || 1;
      var W = container.clientWidth || 320;
      var H = 130;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      ctx.clearRect(0, 0, W, H);
      var pad = { top: 15, bottom: 22, left: 28, right: 10 };
      var cw = W - pad.left - pad.right;
      var ch = H - pad.top - pad.bottom;
      var temps = hourly.map(function(h) { return h.temp; });
      var minT = Math.min.apply(null, temps);
      var maxT = Math.max.apply(null, temps);
      var range = (maxT - minT) || 1;
      var padT = range * 0.15;

      // Grid lines
      ctx.strokeStyle = 'rgba(26,58,106,0.2)';
      ctx.lineWidth = 0.5;
      for (var i = 0; i <= 4; i++) {
        var y = pad.top + (ch / 4) * i;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
        ctx.fillStyle = '#8a9bb5'; ctx.font = '9px sans-serif';
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillText(Math.round(maxT - (range / 4) * i), pad.left - 4, y);
      }

      // Line
      ctx.beginPath();
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = 2;
      ctx.shadowColor = 'rgba(59,130,246,0.3)';
      ctx.shadowBlur = 3;
      for (var i = 0; i < hourly.length; i++) {
        var x = pad.left + (cw / (hourly.length - 1)) * i;
        var y = pad.top + ch - ((temps[i] - minT + padT) / (range + padT*2)) * ch;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Dots
      for (var i = 0; i < Math.min(hourly.length, 25); i++) {
        var x = pad.left + (cw / (Math.min(hourly.length, 25) - 1)) * i;
        var y = pad.top + ch - ((temps[i] - minT + padT) / (range + padT*2)) * ch;
        ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI*2);
        ctx.fillStyle = '#3b82f6'; ctx.fill();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI*2); ctx.fill();
      }

      // Time labels
      ctx.fillStyle = '#8a9bb5';
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for (var i = 0; i < hourly.length; i += 3) {
        var x = pad.left + (cw / (hourly.length - 1)) * i;
        var t = hourly[i].time || '';
        ctx.fillText(t.length > 16 ? t.slice(11,16) : '--', x, H - pad.bottom + 4);
      }
    }

      scene.style.display = 'block';
      var sceneType = 'default';
      if (weatherCode === 0 || weatherCode === 1) sceneType = 'sunny';
      else if (weatherCode === 2 || weatherCode === 3) sceneType = 'cloudy';
      else if (weatherCode >= 61 && weatherCode <= 67 || weatherCode >= 80 && weatherCode <= 82) sceneType = 'rain';
      else if (weatherCode >= 71 && weatherCode <= 77 || weatherCode >= 85 && weatherCode <= 86) sceneType = 'snow';
      else if (weatherCode >= 95) sceneType = 'storm';
      scene.className = 'weather-scene ' + sceneType;
      if (sceneType === 'sunny') {
        sceneCont.innerHTML = '<lottie-player src="anim-sunny.json" background="transparent" speed="1" loop autoplay></lottie-player>';
      } else {
        var html = '';
        if (sceneType === 'cloudy') {
          html += '<div class="wx-cloud" style="width:60px;height:28px;left:30px;top:30px;"></div>';
          html += '<div class="wx-cloud" style="width:50px;height:24px;left:60px;top:20px;animation-delay:2s;animation-duration:5s;"></div>';
          html += '<div style="font-size:50px;animation:float-up 3s ease-in-out infinite;">⛅</div>';
        } else if (sceneType === 'rain') {
          html += '<div class="rain-drops"></div>';
          html += '<div style="font-size:50px;animation:float-up 1.5s ease-in-out infinite;">🌧️</div>';
        } else if (sceneType === 'snow') {
          var flakes = '';
          for (var i = 0; i < 15; i++) {
            var left = Math.random() * 90 + 5;
            var size = Math.random() * 4 + 3;
            var dur = Math.random() * 4 + 3;
            var delay = Math.random() * 5;
            flakes += '<div class="snow-flake" style="left:'+left+'%;width:'+size+'px;height:'+size+'px;animation-duration:'+dur+'s;animation-delay:'+delay+'s;"></div>';
          }
          html += flakes;
          html += '<div style="font-size:50px;animation:float-up 2s ease-in-out infinite;">❄️</div>';
        } else if (sceneType === 'storm') {
          html += '<div class="rain-drops"></div>';
          html += '<div style="font-size:50px;animation:float-up 1s ease-in-out infinite;">⛈️</div>';
        } else {
          html += '<div style="font-size:50px;animation:float-up 3s ease-in-out infinite;">'+getWeatherEmoji(weatherCode)+'</div>';
        }
        sceneCont.innerHTML = html;
      }
    }

    // ==================== 主要操作 ====================
    async function searchAndShowWeather(query) {
      searchResults.classList.remove('show');
      showLoading();

      try {
        const results = await geocode(query);
        if (results.length === 0) {
          showError('未找到该地点，请换个关键词试试（如加上省/市名）');
          return;
        }

        const best = results[0];
        const shortName = best.name.split(',')[0].trim();
        locationName.textContent = shortName;
        saveLocation(best.lat, best.lon, shortName);

        const weather = await getWeather(best.lat, best.lon);
        renderWeather(weather);
      } catch (e) {
        showError('获取数据失败：' + e.message + '。请检查网络后重试。');
      }
    }

    async function loadWeatherForCoords(lat, lon) {
      showLoading();
      try {
        const name = await reverseGeocode(lat, lon);
        const shortName = name ? name.split(',')[0].trim() : '我的位置';
        locationName.textContent = shortName;
        saveLocation(lat, lon, shortName);

        const weather = await getWeather(lat, lon);
        renderWeather(weather);
      } catch (e) {
        showError('获取数据失败：' + e.message + '。请检查网络后重试。');
      }
    }

    // ==================== 事件绑定 ====================
    searchBtn.addEventListener('click', () => {
      const query = searchInput.value.trim();
      if (!query) return;
      searchAndShowWeather(query);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const query = searchInput.value.trim();
        if (!query) return;
        searchAndShowWeather(query);
      }
    });

    // 实时搜索建议
    let searchTimeout;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      const query = searchInput.value.trim();
      if (query.length < 2) {
        searchResults.classList.remove('show');
        return;
      }
      searchTimeout = setTimeout(async () => {
        try {
          const results = await geocode(query);
          searchResults.innerHTML = results.map((r, i) => {
            const parts = r.name.split(',');
            const main = parts[0];
            const rest = parts.slice(1).join('，');
            return `
              <div class="search-result-item" data-index="${i}">
                <div>📍 ${main}</div>
                <div class="place-type">${rest}</div>
              </div>
            `;
          }).join('');
          searchResults.classList.add('show');

          document.querySelectorAll('.search-result-item').forEach(el => {
            el.addEventListener('click', () => {
              const idx = parseInt(el.dataset.index);
              const r = results[idx];
              locationName.textContent = r.name.split(',')[0].trim();
              saveLocation(r.lat, r.lon, r.name.split(',')[0].trim());
              showLoading();
              searchResults.classList.remove('show');
              searchInput.value = r.name.split(',')[0].trim();
              getWeather(r.lat, r.lon).then(renderWeather).catch(e => showError(e.message));
            });
          });
        } catch { /* 静默失败，下拉建议非必需 */ }
      }, 400);
    });

    locateBtn.addEventListener('click', () => {
      if (!navigator.geolocation) {
        showError('你的浏览器不支持定位功能');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          loadWeatherForCoords(pos.coords.latitude, pos.coords.longitude);
        },
        () => {
          showError('定位失败，请手动搜索你的位置');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });

    // 点击空白关闭搜索建议
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-section')) {
        searchResults.classList.remove('show');
      }
    });

    // ==================== 启动 ====================
    function init() {
      // 显示当前日期
      const now = new Date();
      document.getElementById('dateDisplay').textContent = `${now.getMonth()+1}/${now.getDate()}`;

      // 注册 Service Worker (PWA 离线缓存)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }

      const saved = loadLocation();
      if (saved) {
        locationName.textContent = saved.name;
        showLoading();
        getWeather(saved.lat, saved.lon)
          .then(renderWeather)
          .catch(() => {
            hideLoading();
            locationName.textContent = '选择你的位置开始';
          });
      }
    }

    init();
  

</script>
</body>
</html>
